schema_version: 1

context:
  name: langchain-qdrant
  version: "1.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/langchain_qdrant-${{ version }}.tar.gz
  sha256: 433236845736f973543ac6b7137f9d7fa511b7539373fbc6565c581d3ba59373

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - pydantic >=2.7.4,<3.0.0
    - langchain-core >=1.0.0,<2.0.0
    - qdrant-client >=1.15.1,<2.0.0

tests:
  - python:
      imports:
        - langchain_qdrant
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: An integration package connecting Qdrant and LangChain
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/langchain-ai/langchain

extra:
  recipe-maintainers:
    - jan-janssen
